<!doctype html>
<html>

    <h2>Form tags</h2>
    <form>

        <input type="email" placeholder="Enter email" required>

        <label for="">Profile picture</label> <br>
        <input type="file" accept=".mp4,.png,.jpeg">
        <br> <br>
        
        <input type="submit" value="Submit"> | 
        <input type="reset" value="Reset">
    </form>

  </body>
</html>
