<!doctype html>
<html>
  <head>
    <title>Document</title>
  </head>
  <body>
    <h2>Form tags</h2>
    <marquee direction="right">Web</marquee>
    <form>
      <label for="">Pick house color</label> <br />
      <input type="color" />
      <br />
      <br />

      <label>Name</label> <br />
      <input type="text" placeholder="Enter name" required />
      <br />
      <br />

      <label>Email</label> <br />
      <input type="email" placeholder="Enter email" required />
      <br />
      <br />

      <label>Phone no#</label> <br />
      <input type="number" placeholder="Enter contact" />
      <br />
      <br />

      <label>Admission date</label> <br />
      <input type="date" />
      <input type="time" />
      <br />
      <br />

      <label>Address</label> <br />
      <textarea placeholder="Enter your address" cols="22" rows="5"></textarea>
      <br />
      <br />

      <label>Profile picture</label> <br />
      <input type="file" accept=".mp4,.png,.jpeg" />
      <br />
      <br />

      <label>Gender</label> <br />
      <input type="radio" name="gender" id="m" />
      <label for="m">Male</label>

      <input type="radio" name="gender" id="fm" />
      <label for="fm">Female</label>

      <br />
      <br />
      <label>Course Selection</label> <br />
      <input type="checkbox" id="web" />
      <label for="web">Website design & development</label>

      <input type="checkbox" id="blender" />
      <label for="blender">Blender LTS</label>

      <br />
      <br />

      <select>
        <option>---Choose one---</option>
        <option>IT</option>
        <option>Softskill</option>
        <option>Science</option>
      </select>

      <br />
      <br />

      <label for="browser">Choose your browser:</label> <br />
      <input type="text" list="browsers" name="browser" id="browser" />
      <datalist id="browsers">
        <option value="Edge"></option>
        <option value="Firefox"></option>
        <option value="Chrome"></option>
        <option value="Safari"></option>
      </datalist>

      <br />
      <br />
      <input type="submit" value="Submit" /> |
      <input type="reset" value="Reset" />
    </form>

  </body>
</html>
