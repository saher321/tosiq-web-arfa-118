<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Col Span - Row Span</h2>

    <table border="0" width="100%" cellspacing="0" cellpadding="">
        <tr>
            <td colspan="2"> Marketing Manager </td>
        </tr>
        <tr>
            <td>XYZ Corp, Sweden</td>
            <td align="right"> January 2009 - Present </td>
        </tr>
    </table>

    <hr>

    <table border="1" cellspacing="0" cellpadding="10">
        <tr>
            <td>1</td>
            <td rowspan="2">2</td>
            <td>3</td>
        </tr>
        <tr>
            <td>4</td>
            <td>6</td>
        </tr>
        <tr>
            <td>7</td>
            <td colspan="2">8</td>
        </tr>
    </table>

</body>
</html>
